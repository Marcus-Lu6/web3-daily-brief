<title>Web3 Daily Brief</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-dim: #1f3244;
    --green: #3fb950;
    --green-bg: #0f2a0f;
    --red: #f85149;
    --red-bg: #2a0f0f;
    --yellow: #d29922;
    --yellow-bg: #2a1f0a;
    --orange: #e3b341;
    --purple: #bc8cff;
    --fire: #ff7b54;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: fixed;
    top: 0; left: 0;
    overflow-y: auto;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .sidebar-logo h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .sidebar-logo span {
    font-size: 11px;
    color: var(--text-dim);
    display: block;
    margin-top: 2px;
  }

  .sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 8px 20px 4px;
  }

  .date-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 20px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .date-link:hover { background: var(--surface2); color: var(--text); }
  .date-link.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-dim);
  }
  .date-link .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .date-link.active .dot { background: var(--accent); }
  .date-link .badge-new {
    margin-left: auto;
    font-size: 9px;
    background: var(--green);
    color: #000;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 700;
  }

  /* ── Main ── */
  #main {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
  }

  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  #header .date-display {
    font-size: 13px;
    color: var(--text-dim);
  }
  #header .date-display strong {
    color: var(--text);
    font-size: 15px;
  }
  #header .meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex; gap: 16px; align-items: center;
  }
  .sentiment-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .sentiment-fear { background: var(--red-bg); color: var(--red); }
  .sentiment-greed { background: var(--green-bg); color: var(--green); }
  .sentiment-neutral { background: var(--yellow-bg); color: var(--yellow); }

  #content {
    padding: 32px 40px;
    max-width: 1100px;
  }

  /* ── Section ── */
  .section {
    margin-bottom: 36px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Summary Card ── */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    margin-bottom: 20px;
    border-left: 3px solid var(--accent);
  }
  .summary-card .headline {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
  }
  .summary-card .meta-row {
    margin-top: 10px;
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .price-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 600;
  }
  .price-pill .label { color: var(--text-muted); font-weight: 400; }

  /* ── Top 3 Cards ── */
  .top3-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 8px;
  }
  @media (max-width: 900px) { .top3-grid { grid-template-columns: 1fr; } }
  .top3-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .top3-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .top3-card.p0::before { background: var(--red); }
  .top3-card.p1::before { background: var(--orange); }
  .top3-card.p2::before { background: var(--accent); }
  .top3-card .rank {
    font-size: 10px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .top3-card .event { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .top3-card .impact { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; line-height: 1.4; }
  .top3-card .action {
    font-size: 11px; color: var(--accent);
    background: var(--accent-dim); padding: 4px 8px;
    border-radius: 4px; display: inline-block;
  }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 9px 12px; color: var(--text); vertical-align: middle; }
  td.dim { color: var(--text-dim); }
  td.muted { color: var(--text-muted); }

  .rank-num {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    width: 24px; text-align: center;
  }
  .chain-name { font-weight: 600; color: var(--text); }
  .chain-type {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 1px 5px; border-radius: 3px; margin-left: 4px;
    background: var(--surface2); color: var(--text-muted);
  }

  .score-bar-cell { min-width: 120px; }
  .score-bar {
    display: flex; align-items: center; gap: 8px;
  }
  .score-bar .bar-bg {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .score-bar .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .score-bar .val { font-size: 12px; font-weight: 700; color: var(--text); min-width: 24px; }

  .change-up { color: var(--green); font-weight: 600; }
  .change-down { color: var(--red); font-weight: 600; }
  .change-flat { color: var(--text-muted); }
  .change-hot { color: var(--fire); font-weight: 700; }

  .signal-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 2px 7px; border-radius: 4px;
  }
  .sig-up { background: var(--green-bg); color: var(--green); }
  .sig-down { background: var(--red-bg); color: var(--red); }
  .sig-warn { background: var(--yellow-bg); color: var(--yellow); }
  .sig-hot { background: #2a1500; color: var(--fire); }
  .sig-new { background: #1a1f2a; color: var(--purple); }

  /* ── DeFi Signal Cards ── */
  .signal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 800px) { .signal-grid { grid-template-columns: 1fr; } }
  .signal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .signal-card.star3 { border-color: var(--fire); }
  .signal-card.star2 { border-color: var(--yellow); }
  .signal-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .signal-header .title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .star-badge { font-size: 13px; color: var(--fire); white-space: nowrap; }
  .signal-stats {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px;
  }
  .stat-pill {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 5px; font-size: 12px;
  }
  .stat-pill .k { color: var(--text-muted); margin-right: 3px; }
  .stat-pill .v { font-weight: 700; color: var(--text); }
  .stat-pill .v.hot { color: var(--green); }
  .stat-pill .v.cold { color: var(--red); }
  .signal-points { list-style: none; padding: 0; }
  .signal-points li {
    font-size: 12px; color: var(--text-dim); padding: 3px 0;
    padding-left: 14px; position: relative; line-height: 1.5;
  }
  .signal-points li::before {
    content: '·'; position: absolute; left: 4px; color: var(--text-muted);
  }
  .signal-action {
    margin-top: 10px; padding: 8px 10px;
    background: var(--accent-dim); border-radius: 5px;
    font-size: 12px; color: var(--accent); line-height: 1.4;
  }
  .signal-action .label { font-weight: 700; margin-right: 4px; }

  /* ── Alerts ── */
  .alert-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .alert-row:last-child { border-bottom: none; }
  .alert-time { font-size: 11px; color: var(--text-muted); min-width: 44px; padding-top: 2px; }
  .alert-level {
    font-size: 10px; font-weight: 700; padding: 2px 6px;
    border-radius: 3px; white-space: nowrap; flex-shrink: 0;

  .level-p0 { background: var(--red-bg); color: var(--red); }
  .level-p1 { background: var(--yellow-bg); color: var(--yellow); }
  .level-watch { background: #1a2030; color: var(--purple); }
  .alert-text { font-size: 13px; color: var(--text-dim); }
  .alert-text strong { color: var(--text); }

  /* ── Action Table ── */
  .action-p0 { color: var(--red); font-weight: 700; }
  .action-p1 { color: var(--orange); font-weight: 600; }
  .action-p2 { color: var(--text-muted); }

  /* ── Security ── */
  .security-card {
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: 8px; padding: 14px 18px;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .security-icon { font-size: 20px; line-height: 1; }
  .security-body .title { font-weight: 700; font-size: 14px; color: var(--red); margin-bottom: 4px; }
  .security-body .detail { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* ── Narrative ── */
  .narrative-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .narrative-row:last-child { border-bottom: none; }
  .narrative-rank { font-size: 16px; font-weight: 800; color: var(--text-muted); min-width: 22px; }
  .narrative-body .name { font-size: 13px; font-weight: 600; color: var(--text); }
  .narrative-body .projects { font-size: 12px; color: var(--text-muted); }
  .competitor-alert {
    margin-top: 12px;
    background: var(--yellow-bg); border: 1px solid var(--yellow);
    border-radius: 6px; padding: 10px 14px;
    font-size: 12px; color: var(--text-dim); line-height: 1.5;
  }
  .competitor-alert strong { color: var(--yellow); }

  /* ── Market Overview ── */
  .market-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 8px;
  }
  @media (max-width: 800px) { .market-grid { grid-template-columns: repeat(2,1fr); } }
  .market-card {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px;
  }
  .market-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .market-card .value { font-size: 18px; font-weight: 700; color: var(--text); }
  .market-card .change { font-size: 12px; margin-top: 2px; }

  /* ── Footer ── */
  #footer {
    padding: 20px 40px;
    color: var(--text-muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

const dates = Object.keys(BRIEFS).sort().reverse();
let currentDate = dates[0];

function buildNav() {
  const nav = document.getElementById('date-nav');
  nav.innerHTML = dates.map((d, i) => {
    const b = BRIEFS[d];
    return `<a class="date-link ${i===0?'active':''}" onclick="loadBrief('${d}')" id="nav-${d}">
      <span class="dot"></span>
      ${d} ${b.weekday}
      ${i===0 ? '<span class="badge-new">NEW</span>' : ''}
    </a>`;
  }).join('');
}

function loadBrief(date) {
  currentDate = date;
  document.querySelectorAll('.date-link').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+date).classList.add('active');
  renderBrief(BRIEFS[date]);
  window.scrollTo(0, 0);
}

function renderBrief(b) {
  // header
  document.getElementById('display-date').textContent = `${b.date} (${b.weekday})`;
  document.getElementById('display-sources').textContent = `数据源: ${b.sources}`;
  document.getElementById('display-prices').textContent = `BTC ${b.btc} · ETH ${b.eth} · SOL ${b.sol}`;
  const sb = document.getElementById('display-sentiment');
  sb.className = `sentiment-badge ${b.fgClass}`;
  sb.textContent = `${b.fg <= 25 ? '😱' : b.fg <= 45 ? '😟' : b.fg <= 55 ? '😐' : b.fg <= 75 ? '😊' : '🤑'} ${b.fgLabel} ${b.fg}`;
  document.getElementById('gen-time').textContent = `Generated: ${b.genTime}`;

  const content = document.getElementById('content');

  content.innerHTML = `
    ${renderSummary(b)}
    ${renderTop3(b)}
    ${renderMarket(b)}
    ${renderChains(b)}
    ${renderDefiSignals(b)}
    ${renderProtocols(b)}
    ${renderDex(b)}
    ${renderSecurity(b)}
    ${renderNarratives(b)}
    ${renderActions(b)}
    ${renderAlerts(b)}
  `;
}

function renderSummary(b) {
  return `<div class="section">
    <div class="summary-card">
      <div class="headline">${b.headline}</div>
      <div class="meta-row">
        <span class="price-pill"><span class="label">BTC</span>${b.btc}</span>
        <span class="price-pill"><span class="label">ETH</span>${b.eth}</span>
        <span class="price-pill"><span class="label">SOL</span>${b.sol}</span>
        <span class="price-pill"><span class="label">F&G</span>${b.fg} ${b.fgLabel}</span>

}

}

function renderSecurity(b) {
  const cards = b.security.map(s => `
    <div class="security-card">
      <div class="security-icon">🚨</div>
      <div class="security-body">
        <div class="title">${s.name} — 损失 ${s.loss}</div>
        <div class="detail">链: ${s.chain} &nbsp;·&nbsp; 类型: ${s.type}</div>
      </div>
    </div>`).join('');

  return `<div class="section">
    <div class="section-title">🛡️ 安全事件</div>
    ${cards}
  </div>`;
}

function renderNarratives(b) {
  const rows = b.narratives.map(n => `
    <div class="narrative-row">
      <div class="narrative-rank">${n.rank}</div>
      <div class="narrative-body">
        <div class="name">${n.name}</div>
        <div class="projects">${n.projects}</div>
      </div>
    </div>`).join('');

  return `<div class="section">
    <div class="section-title">📣 社交叙事 & 竞品动态</div>
    ${rows}
    <div class="competitor-alert">${b.competitorAlert}</div>
  </div>`;
}

function renderActions(b) {
  const rows = b.actions.map(a => `
    <tr>
      <td><span class="action-${a.p.toLowerCase()}">${a.p}</span></td>
      <td style="font-weight:600">${a.item}</td>
      <td class="dim" style="font-size:12px">${a.note}</td>
    </tr>`).join('');

  return `<div class="section">
    <div class="section-title">🎯 PM 行动清单</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>优先级</th><th>行动项</th><th>说明</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderAlerts(b) {
  const rows = b.alerts.map(a => `
    <div class="alert-row">
      <span class="alert-time">${a.time}</span>
      ${a.levelCls ? `<span class="alert-level ${a.levelCls}">${a.level}</span>` : `<span style="min-width:40px"></span>`}
      <span class="alert-text">${a.text}</span>
    </div>`).join('');

  return `<div class="section">
    <div class="section-title">⚡ 小时监控告警摘要</div>
    ${rows}
  </div>`;
}

// ── Init ──
buildNav();
renderBrief(BRIEFS[currentDate]);
</script>
</body>
</html>
